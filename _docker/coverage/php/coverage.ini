; Runtime PHP code coverage (manual testing).
; Mounted as /usr/local/etc/php/conf.d/zz-coverage.ini by docker-compose.coverage.yml,
; overriding the xdebug.mode=off default baked into the development image.
; Xdebug (line + branch/path coverage) is deliberately used instead of PCOV:
; slower per request, but the reports are far more detailed — acceptable
; because coverage mode is opt-in.
xdebug.mode=coverage
xdebug.start_with_request=no
auto_prepend_file=/opt/coverage/collect.php
