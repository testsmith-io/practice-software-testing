"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type User {
    id: ID!
    first_name: String!
    last_name: String!
    email: String!
    address: String
    city: String
    state: String
    country: String
    postcode: String
    phone: String
    dob: String
    role: String
    enabled: Boolean
    created_at: DateTime
}

type Product {
    id: ID!
    name: String!
    description: String
    price: Float
    is_location_offer: Boolean
    is_rental: Boolean
    in_stock: Boolean
    stock: Int
    co2_rating: String
    is_eco_friendly: Boolean
    category: Category @belongsTo
    brand: Brand @belongsTo
    product_image: ProductImage @belongsTo
}

type Brand {
    id: ID!
    name: String!
    slug: String!
    products: [Product!]! @hasMany
}

type Category {
    id: ID!
    name: String!
    slug: String!
    parent_id: ID
    parent_category: Category @belongsTo
    sub_categories: [Category!]! @hasMany
}

type ProductImage {
    id: ID!
    by_name: String
    by_url: String
    source_name: String
    source_url: String
    file_name: String
    title: String
}

type Invoice {
    id: ID!
    user_id: ID!
    invoice_date: DateTime
    invoice_number: String
    billing_address: String
    billing_city: String
    billing_state: String
    billing_country: String
    billing_postcode: String
    total: Float
    payment_method: String
    payment_account_name: String
    payment_account_number: String
    status: String
    status_message: String
    user: User @belongsTo
    invoicelines: [Invoiceline!]! @hasMany
}

type Invoiceline {
    id: ID!
    invoice_id: ID!
    product_id: ID!
    unit_price: Float
    quantity: Int
    product: Product @belongsTo
    invoice: Invoice @belongsTo
}

type Favorite {
    id: ID!
    user_id: ID!
    product_id: ID!
    product: Product @belongsTo
}

type ContactRequest @model(class: "App\\Models\\ContactRequests") {
    id: ID!
    user_id: ID
    name: String
    email: String
    subject: String
    message: String
    status: String
    user: User @belongsTo
    replies: [ContactRequestReply!]! @hasMany
    created_at: DateTime
}

type ContactRequestReply {
    id: ID!
    user_id: ID
    message_id: ID
    message: String
    user: User @belongsTo
    created_at: DateTime
}

type AuthPayload {
    access_token: String!
    token_type: String!
    expires_in: Int!
}

type Query {
    "Get a single product by ID."
    product(id: ID! @eq): Product @find

    "List all products with optional filters."
    products(
        name: String @where(operator: "like")
        category_id: ID @eq
        brand_id: ID @eq
        is_rental: Boolean @eq
    ): [Product!]! @all

    "List all brands."
    brands: [Brand!]! @all

    "Get a single brand by ID."
    brand(id: ID! @eq): Brand @find

    "List all categories."
    categories: [Category!]! @all

    "Get a single category by ID."
    category(id: ID! @eq): Category @find

    "Get a single user by ID."
    user(id: ID! @eq): User @find @guard

    "List all users."
    users: [User!]! @all @guard

    "Get a single invoice by ID."
    invoice(id: ID! @eq): Invoice @find @guard

    "List all invoices."
    invoices: [Invoice!]! @all @guard

    "List all favorites for the authenticated user."
    favorites: [Favorite!]! @all @guard

    "List all contact requests."
    contactRequests: [ContactRequest!]! @all @guard

    "Get a single contact request by ID."
    contactRequest(id: ID! @eq): ContactRequest @find @guard
}

type Mutation {
    "Authenticate and get a JWT token."
    login(email: String!, password: String!): AuthPayload!

    "Register a new user."
    register(
        first_name: String!
        last_name: String!
        email: String!
        password: String!
        address: String
        city: String
        state: String
        country: String
        postcode: String
        phone: String
        dob: String
    ): User!

    "Create a new brand."
    createBrand(name: String!, slug: String!): Brand! @create @guard

    "Update a brand."
    updateBrand(id: ID!, name: String, slug: String): Brand! @update @guard

    "Delete a brand."
    deleteBrand(id: ID! @eq): Brand @delete @guard

    "Create a new category."
    createCategory(name: String!, slug: String!, parent_id: ID): Category! @create @guard

    "Update a category."
    updateCategory(id: ID!, name: String, slug: String, parent_id: ID): Category! @update @guard

    "Delete a category."
    deleteCategory(id: ID! @eq): Category @delete @guard

    "Create a new product."
    createProduct(
        name: String!
        description: String
        price: Float
        is_location_offer: Boolean
        is_rental: Boolean
        in_stock: Boolean
        stock: Int
        category_id: ID
        brand_id: ID
        product_image_id: ID
    ): Product! @create @guard

    "Update a product."
    updateProduct(
        id: ID!
        name: String
        description: String
        price: Float
        is_location_offer: Boolean
        is_rental: Boolean
        in_stock: Boolean
        stock: Int
        category_id: ID
        brand_id: ID
        product_image_id: ID
    ): Product! @update @guard

    "Delete a product."
    deleteProduct(id: ID! @eq): Product @delete @guard

    "Add a product to favorites."
    addFavorite(product_id: ID!): Favorite! @create @guard

    "Remove a favorite."
    deleteFavorite(id: ID! @eq): Favorite @delete @guard

    "Send a contact message (public)."
    sendContactMessage(
        user_id: ID
        name: String
        email: String
        subject: String!
        message: String!
        status: String
    ): ContactRequest! @create

    "Reply to a contact message."
    replyToContactMessage(
        user_id: ID
        message_id: ID!
        message: String!
    ): ContactRequestReply! @create @guard

    "Update the status of an invoice."
    updateInvoiceStatus(id: ID!, status: String!, status_message: String): Invoice! @guard
}
