name: Run Playwright Tests 🎭

on:
  push:
    branches: [ main ]

concurrency: production_environment

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      SPRINT: sprint5
      DISABLE_LOGGING: "true"
    steps:
      - name: Checkout ⚙️
        uses: actions/checkout@v4
      - name: Start containers 🐳
        run: docker compose -f docker-compose.yml up -d --force-recreate
      - name: Sleep for 30 seconds (wait for containers)
        run: sleep 30s
      - name: Install Composer dependencies 📦
        run: docker compose exec -T -u root laravel-api composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-ffi
      - name: Wait for database to be ready 🗄️
        run: |
          echo "Waiting for MariaDB..."
          for i in $(seq 1 30); do
            if docker compose exec -T mariadb mysqladmin ping -h localhost -u root -proot --silent 2>/dev/null; then
              echo "MariaDB is ready!"
              break
            fi
            echo "Attempt $i/30 - not ready yet, waiting 2s..."
            sleep 2
          done
      - name: Create & Seed database 🌱
        run: |
          docker compose exec -T laravel-api php artisan migrate:refresh --seed
      - name: GET Version
        run: curl -v -X GET 'http://localhost:8091/status'
      - name: POST login
        run: |
          curl -v -X POST 'http://localhost:8091/users/login' \
          -H 'Content-Type: application/json' \
          --data-raw '{"email":"customer@practicesoftwaretesting.com","password":"welcome01"}'
      - name: Wait for Angular UI to be ready 🕐
        run: |
          echo "Waiting for Angular UI on port 4200..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4200 | grep -q "200"; then
              echo "Angular UI is ready!"
              exit 0
            fi
            echo "Attempt $i/60 - not ready yet, waiting 5s..."
            sleep 5
          done
          echo "Angular UI failed to start within 5 minutes"
          docker compose logs angular-ui
          exit 1
      - name: Install node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies ⚙️
        run: |
          npm ci
          PLAYWRIGHT_VERSION=$(npm ls --json @playwright/test | jq --raw-output '.dependencies["@playwright/test"].version')
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV
      # Cache browser binaries, cache key is based on Playwright version and OS
      - name: 🧰 Cache Playwright browser binaries
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: "~/.cache/ms-playwright"
          key: "${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}"
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Install browser binaries & OS dependencies if cache missed
      - name: 🏗 Install Playwright browser binaries & OS dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npx playwright install --with-deps

      # Install only the OS dependencies if cache hit
      - name: 🏗 Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          npx playwright install-deps
      - name: Run Playwright tests 🧪
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report 📊
          path: playwright-report/
          retention-days: 10
